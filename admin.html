<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://mhvcyeiwupgreuiqilkt.supabase.co";
const SUPABASE_KEY = "sb_publishable_uT6SfDEyOShsI7zrPJJCDA_vyqm0Eka";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// BOTÃO MODAL
function abrirModal(){
  document.getElementById("modalPerfil").style.display = "block";
}

function fecharModal(){
  document.getElementById("modalPerfil").style.display = "none";
}

// UPLOAD MÚSICA
async function subirMusica(){

  try{

    alert("Iniciando upload...");

    const nome = document.getElementById("nomeMusica").value;
    const artista = document.getElementById("nomeArtista").value || "Artista";

    const genero = document.getElementById("generoMusica").value;
    const sub = document.getElementById("subgeneroMusica").value;
    const status = document.getElementById("statusMusica").value;

    const valorLivre = document.getElementById("valorLivre").value || "A combinar";
    const valorExclusivo = document.getElementById("valorExclusivo").value || "A combinar";

    const mp3 = document.getElementById("arquivoMP3").files[0];
    const capa = document.getElementById("capaMusica").files[0];

    if(!nome || !mp3 || !capa){
      alert("Preencha tudo!");
      return;
    }

    // MP3
    const { data: mp3Data, error: mp3Error } = await supabaseClient.storage
      .from('musicas')
      .upload(`mp3/${Date.now()}_${mp3.name}`, mp3);

    if(mp3Error){
      alert("Erro MP3: " + mp3Error.message);
      return;
    }

    alert("MP3 OK");

    // CAPA
    const { data: capaData, error: capaError } = await supabaseClient.storage
      .from('musicas')
      .upload(`capas/${Date.now()}_${capa.name}`, capa);

    if(capaError){
      alert("Erro imagem: " + capaError.message);
      return;
    }

    alert("Imagem OK");

    const mp3_url = SUPABASE_URL + "/storage/v1/object/public/musicas/" + mp3Data.path;
    const capa_url = SUPABASE_URL + "/storage/v1/object/public/musicas/" + capaData.path;

    // BANCO
    const { error } = await supabaseClient.from('musicas').insert([{
      nome,
      artista,
      genero,
      subgenero: sub,
      status,
      valor_livre: valorLivre,
      valor_exclusivo: valorExclusivo,
      mp3_url,
      capa_url
    }]);

    if(error){
      alert("Erro banco: " + error.message);
      return;
    }

    alert("Música salva com sucesso!");

  }catch(e){
    alert("ERRO GERAL: " + e.message);
    console.log(e);
  }
}
</script>
