<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Artista – Demo Blindado</title>
<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:linear-gradient(135deg,#000,#0a0a0a,#1a1a00); color:white; }
.header{text-align:center;padding:20px;}
.nome-artista{color:#f5d76e;font-size:2.5rem;}
.top-buttons{text-align:center;margin:10px 0;}
.top-buttons button{margin:5px;padding:8px 15px;border:none;border-radius:5px;background:#f5d76e;color:#000;font-weight:bold;cursor:pointer;}
.capa-artista{width:100%;max-width:600px;height:250px;margin:20px auto;border-radius:10px;overflow:hidden;background:#222;display:flex;justify-content:center;align-items:center;}
.capa-artista img{width:100%;height:100%;object-fit:cover;}
.contatos{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;max-width:600px;margin:20px auto;}
.contato-card{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);font-size:14px;overflow-wrap:break-word;}
.instagram{color:#E1306C;} .spotify{color:#1DB954;} .whatsapp{color:#25D366;} .email{color:#f5d76e;} .tiktok{color:#fff;}
.filtros{text-align:center;margin:20px 0;}
.filtros button{margin:5px;padding:8px 12px;border:none;border-radius:5px;background:#f5d76e;color:#000;cursor:pointer;font-weight:bold;}
.filtros button.off{background:#333;color:#999;}
.players{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-bottom:50px;}
.player-card{background:rgba(255,255,255,0.05);width:260px;border-radius:10px;text-align:center;padding:10px;}
.player-card img{width:100%;height:150px;object-fit:cover;}
.player-card .valores{margin-top:5px;font-size:13px; color:#f5d76e;}
#btnNotificacao{position:fixed;top:10px;right:10px;padding:10px 15px;border:none;border-radius:50px;background:#f5d76e;color:#000;cursor:pointer;}
#notificacoesContainer{display:none;position:fixed;top:50px;right:10px;width:320px;max-height:400px;overflow-y:auto;background:rgba(0,0,0,0.9);border-radius:10px;padding:10px;flex-direction:column;}
.modal-planos,.modal-interesse{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;}
.modal-planos .box,.modal-interesse .box{background:#111;padding:20px;border-radius:10px;width:90%;max-width:400px;color:white;}
.plano, .modal-interesse input, .modal-interesse textarea {width:100%;}
.plano{background:rgba(255,255,255,0.05);padding:10px;margin:10px 0;border-radius:8px;}
.plano button, .modal-interesse button {margin-top:5px;width:100%;background:#f5d76e;border:none;padding:8px;border-radius:5px;cursor:pointer;font-weight:bold;}
.modal-interesse input, .modal-interesse textarea{padding:8px;margin:5px 0;border-radius:5px;border:none;background:#222;color:white;}
.modal-interesse textarea{resize:none;}
</style>
</head>
<body>

<div class="header">
  <h1>Portal do Artista</h1>
  <h2 class="profissao">Compositor</h2>
  <h1 class="nome-artista">Seu Nome Aqui</h1>
</div>

<div class="top-buttons">
    <button onclick="alert('Login não disponível no demo')">Login</button>
    <button onclick="alert('VIP não disponível no demo')">VIP</button>
    <button onclick="abrirPlanosDemo()">Planos</button>
</div>

<div class="capa-artista" id="capaArtista">
  <img src="https://i.postimg.cc/Dwx4CWGt/1001220151-(4).jpg" alt="Capa do Artista Demo">
</div>

<div class="contatos">
  <div class="contato-card whatsapp">📞 <span>+55 21 99999-9999</span></div>
  <div class="contato-card instagram">📸 <span>@demoartista</span></div>
  <div class="contato-card email">✉️ <span>demo@artista.com</span></div>
  <div class="contato-card spotify">🎵 <span>spotify.com/demo</span></div>
  <div class="contato-card tiktok">🎶 <span>@demoartista</span></div>
</div>

<div class="filtros">
  <button data-genero="Sertanejo">Sertanejo</button>
  <button data-genero="Piseiro">Piseiro</button>
  <button data-genero="Forró">Forró</button>
  <button data-genero="Pagode">Pagode</button>
  <button data-genero="Samba">Samba</button>
  <button data-genero="MPB">MPB</button>
  <button data-genero="Pop">Pop</button>
  <button data-genero="Rock">Rock</button>
  <button data-genero="Funk">Funk</button>
  <button data-genero="Rap">Rap</button>
  <button data-genero="Arrocha">Arrocha</button>
  <button data-genero="Reggae">Reggae</button>
</div>

<div class="players" id="playersContainer"></div>

<button id="btnNotificacao">🔔 0</button>
<div id="notificacoesContainer" style="display:flex;"></div>

<!-- Modal Planos -->
<div class="modal-planos" id="modalPlanos">
  <div class="box">
    <h3>Planos Demo</h3>
    <div class="plano"><b>Free</b><br>2 músicas - R$0 <button onclick="alert('Plano Free')">Contratar</button></div>
    <div class="plano"><b>Básico</b><br>20 músicas - R$20 <button onclick="alert('Plano Básico')">Contratar</button></div>
    <div class="plano"><b>Intermediário</b><br>70 músicas - R$50 <button onclick="alert('Plano Intermediário')">Contratar</button></div>
    <div class="plano"><b>Pro</b><br>100 músicas - R$70 <button onclick="alert('Plano Pro')">Contratar</button></div>
    <div class="plano"><b>Premium</b><br>200 músicas - R$100 <button onclick="alert('Plano Premium')">Contratar</button></div>
    <button onclick="fecharPlanosDemo()">Fechar</button>
  </div>
</div>

<!-- Modal Interesse -->
<div class="modal-interesse" id="modalInteresse">
  <div class="box">
    <h3>Tenho Interesse</h3>
    <input type="text" id="interesseNome" placeholder="Nome">
    <input type="email" id="interesseEmail" placeholder="E-mail">
    <input type="text" id="interesseTelefone" placeholder="Telefone">
    <textarea id="interesseMensagem" placeholder="Mensagem"></textarea>
    <button id="btnEnviarInteresse">Enviar</button>
    <button onclick="fecharInteresse()">Cancelar</button>
  </div>
</div>

<script>
// URL fixa da arte
const arteDemo = "https://i.postimg.cc/Dwx4CWGt/1001220151-(4).jpg";

// Dados demo 8 músicas com áudio demo e valores
const musicasDemo = [
  { nome:"Música 1", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", capa_url:arteDemo, genero:"Samba", livre:"Livre", exclusividade:"Sim" },
  { nome:"Música 2", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", capa_url:arteDemo, genero:"Pagode", livre:"Livre", exclusividade:"Não" },
  { nome:"Música 3", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", capa_url:arteDemo, genero:"Forró", livre:"Livre", exclusividade:"Sim" },
  { nome:"Música 4", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", capa_url:arteDemo, genero:"Sertanejo", livre:"Livre", exclusividade:"Não" },
  { nome:"Música 5", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", capa_url:arteDemo, genero:"MPB", livre:"Livre", exclusividade:"Sim" },
  { nome:"Música 6", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", capa_url:arteDemo, genero:"Pop", livre:"Livre", exclusividade:"Não" },
  { nome:"Música 7", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", capa_url:arteDemo, genero:"Rock", livre:"Livre", exclusividade:"Sim" },
  { nome:"Música 8", artista:"Demo", mp3_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", capa_url:arteDemo, genero:"Rap", livre:"Livre", exclusividade:"Não" }
];

// Carrega músicas demo no container
function carregarMusicasDemo() {
  const container = document.getElementById("playersContainer");
  container.innerHTML = "";
  musicasDemo.forEach(m => {
    const card = document.createElement("div");
    card.className = "player-card";
    card.dataset.genero = m.genero;
    card.innerHTML = `
      <img src="${m.capa_url}" alt="${m.nome}">
      <h3>${m.nome}</h3>
      <p>${m.artista}</p>
      <audio controls src="${m.mp3_url}"></audio>
      <div class="valores">💰 ${m.livre} | 🎵 Exclusividade: ${m.exclusividade}</div>
      <button onclick="abrirInteresse()">Tenho Interesse</button>
    `;
    container.appendChild(card);
  });
  aplicarFiltro(); 
}

// Filtro
function aplicarFiltro() {
  const botoes = document.querySelectorAll(".filtros button");
  const ativos = Array.from(botoes).filter(b=>!b.classList.contains("off")).map(b=>b.dataset.genero);
  document.querySelectorAll(".player-card").forEach(card => {
    card.style.display = (ativos.length===0 || ativos.includes(card.dataset.genero)) ? "block" : "none";
  });
}

// Toggle filtros
document.querySelectorAll(".filtros button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    btn.classList.toggle("off");
    aplicarFiltro();
  });
});

// Modais
function abrirPlanosDemo(){ document.getElementById("modalPlanos").style.display = "flex"; }
function fecharPlanosDemo(){ document.getElementById("modalPlanos").style.display = "none"; }
function abrirInteresse(){ document.getElementById("modalInteresse").style.display = "flex"; }
function fecharInteresse(){ document.getElementById("modalInteresse").style.display = "none"; }

// Interesse com validação
document.getElementById("btnEnviarInteresse").onclick = function() {
  const nome = document.getElementById("interesseNome").value.trim();
  const email = document.getElementById("interesseEmail").value.trim();
  const telefone = document.getElementById("interesseTelefone").value.trim();
  const mensagem = document.getElementById("interesseMensagem").value.trim();

  if(!nome || !email || !mensagem){
      alert("Preencha Nome, E-mail e Mensagem.");
      return;
  }
  alert(`Mensagem enviada (simulado)!\nNome: ${nome}\nEmail: ${email}\nTelefone: ${telefone}\nMensagem: ${mensagem}`);
  fecharInteresse();
};

// Notificações fake
let notificacoes = [
  {nome:"João", email:"joao@mail.com", telefone:"21 99999-0000", msg:"Quero contratar música!"},
  {nome:"Maria", email:"maria@mail.com", telefone:"21 98888-1111", msg:"Interessada em show!"}
];

function atualizarNotificacoes(){
  const btn = document.getElementById("btnNotificacao");
  const container = document.getElementById("notificacoesContainer");
  btn.textContent = `🔔 ${notificacoes.length}`;
  container.innerHTML = notificacoes.map((n,i)=>`
    <div style="padding:8px; border-bottom:1px solid #333;">
        <b>${n.nome}</b><br>
        📧 ${n.email}<br>
        📞 ${n.telefone}<br>
        💬 ${n.msg}<br>
        <button onclick="removerNotificacao(${i})" style="margin-top:5px;padding:5px;background:#f5d76e;border:none;border-radius:5px;cursor:pointer;">Excluir</button>
    </div>
  `).join('');
}

function removerNotificacao(index){
  notificacoes.splice(index,1);
  atualizarNotificacoes();
}

document.getElementById("btnNotificacao").onclick = function(){
  const container = document.getElementById("notificacoesContainer");
  container.style.display = container.style.display==='flex' ? 'none' : 'flex';
};

// Inicialização
carregarMusicasDemo();
atualizarNotificacoes();
</script>

</body>
</html>
